<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

     crossorigin="anonymous"></script>

  

<title>Contact | ATM Simulator Project</title>
<!-- Favicon -->
<link rel="icon"  href="OIP.jpeg" type="image/png" />

<!-- SEO -->
<meta name="description" content="Contact page for ATM Simulator Project. Send your queries or feedback." />
<meta name="author" content="Ashlok Kumar" />
<meta name="robots" content="index, follow">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* theme */
:root{
  --bg-main: linear-gradient(160deg, rgba(255,0,0,.2), rgba(0,0,255,.25), rgba(0,128,0,.25));
  --text-main:#111827;
  --card-bg:#ffffff;
  --accent:#2563eb;
  --muted:#6b7280;
  --Sub-heading:#1f2937;

  --input-bg:#ffffff;
  --input-border:#ccc;
}

/* dark mode */
body.dark{
  --bg-main: linear-gradient(160deg,#0b1220,#111827,#020617);
  --text-main:#e5e7eb;
  --card-bg:rgb(21, 33, 60);
  --accent:#6366f1;
  --muted:#dee2e8;
  --Sub-heading:#cfd3d8;

  --input-bg:#0f172a;
  --input-border:#444;
}

/* body */
body{
  background: var(--bg-main);
  color: var(--text-main);
  font-family: sans-serif;
  line-height:1.6;
  padding: clamp(0.8rem, 1.25rem, 1.5rem);
  font-size: clamp(1rem, 1vw + 0.5rem, 1.25rem);
  min-height: 100vh;
  display: flex;
}

/* container */
.container{
  max-width: clamp(320px, 75vw, 850px);
  margin:auto;
  background:var(--card-bg);
  padding: clamp(1rem , 1.5rem, 1.8rem);
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* header */
header{
  text-align:center;
  margin-bottom:20px;
}

header h1{
  color:var(--accent);
}

header p{
  color:var(--muted);
  font-size:14px;
}

/* section */
section{
  margin-top:10px;
}

/* form */
form{
  margin-top:15px;
  position: relative;
}

label{
  font-weight:500;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid var(--input-border);
  margin-top:5px;
  font-size:14px;
  background:var(--input-bg);
  color:var(--text-main); 
  border-color: #2564eb92;
}
input:focus, textarea:focus {
    outline: 2px solid var(--accent);
    border-color: transparent;
}
/* button */
button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  background:var(--accent);
  color:white;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.3s  ease-in;
}


button:hover {
    opacity: 0.9;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}


body.dark button:hover{
  box-shadow: 2px 0 20px rgba(41,41,255,0.6);
}

button:disabled {
    background: #818791;
    cursor: not-allowed;
}


/* back button */
.back-btn{
  margin-top:20px;
  background: var(--accent);
  color: white;
  border: none;
  margin-top: 20px;
}

#my-form-status {
  font-size: 1rem;
  font-weight: bolder;
  margin-top: 1rem;
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.4s ease;
  position: absolute;
  top: -1.5em;
  left: calc(10vw + 12%);
  width: 100%;
}

#my-form-status.show {
  opacity: 1;
  transform: translateY(0);
}

/*  responsive */

@media (max-width: 500px) {

    /* body */
    body{
    padding:0;
    background:var(--card-bg);
    }

    /* container */
    .container{
    max-width: 100%;
    margin:0;
    padding: clamp(1rem , 1.5rem, 1.8rem);
    border-radius:0;
    box-shadow:none;
    }

    #my-form-status {
  font-weight: normal;
  margin-top: 1rem;
  position: absolute;
  top: -1.5em;
  left: calc(1vw + 5%);
  width: 100%;
}
}

</style>
</head>

<body>

<div class="container">

<header>
  <h1>Contact Us</h1>
  <p>Send your feedback or queries</p>
</header>

<section>
  
  <form id="contact-form" action="https://formspree.io/f/xqegndqd" method="POST">

  <input type="text" name="_gotcha" style="display:none">

  <label for="name">Your Name</label>
  <input type="text" id="name" name="name" placeholder="Enter your name" required>
  
  <label for="email">Your Email</label>
  <input type="email" id="email" name="email" placeholder="email@example.com" required>

  <label for="message">Your Message</label>
  <textarea id="message" name="message" rows="5" placeholder="How can we help?" required></textarea>

  <!-- submission time -->
  <input type="hidden" name="time" id="time">
  
  <button type="submit" id="submit-btn">Send Message</button>
            
  
  <!-- success/error message -->
  <p id="my-form-status"></p>

</form>

</section>

<button class="back-btn" onclick="history.back()">⬅ Back</button>

</div>

<script>
 window.onload = function() {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
        }
    }
  
    // form submission logic (AJAX)
    const form = document.getElementById("contact-form");
    const statusMsg = document.getElementById("my-form-status");
    const submitBtn = document.getElementById("submit-btn");

    
    async function handleSubmit(event) {
        event.preventDefault();

           // set time
      document.getElementById("time").value = new Date().toLocaleString();
    

        const data = new FormData(event.target);
        
        // updates
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";
        statusMsg.innerText = "";

        fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                statusMsg.style.color="rgb(33, 247, 18) ";
                statusMsg.innerText = "Success! Your message has been sent.";
                statusMsg.classList.add("show");

                statusMsg.classList.add("show");

                setTimeout(() => {
                    statusMsg.classList.remove("show");
                }, 3000);

                form.reset();
                submitBtn.innerText = "Send Message";
                submitBtn.disabled = false;
            } else {
                response.json().then(data => {
                   statusMsg.style.color = "red";
                    if (Object.hasOwn(data, 'errors')) {
                        statusMsg.innerText = data["errors"].map(error => error["message"]).join(", ");
                        
                        statusMsg.classList.add("show");

                        setTimeout(() => {
                            statusMsg.classList.remove("show");
                        }, 3000);

                    } else {
                        statusMsg.innerText = "Oops! Problem submitting form.";

                        statusMsg.classList.add("show");

                          setTimeout(() => {
                              statusMsg.classList.remove("show");
                          }, 3000);
                    }
                })
                submitBtn.innerText = "Send Message";
                submitBtn.disabled = false;
            }
        }).catch(error => {
            statusMsg.style.color = "red";
            statusMsg.innerText = "Network error. Please try again.";

            statusMsg.classList.add("show");

            setTimeout(() => {
                statusMsg.classList.remove("show");
            }, 3000);

            submitBtn.innerText = "Send Message";
            submitBtn.disabled = false;
        });
    }

    form.addEventListener("submit", handleSubmit);
</script>



<script src="js/index.js"></script>

</body>
</html>
